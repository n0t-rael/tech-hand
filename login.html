<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#00c6ff,#0072ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:20px;
    width:300px;
    text-align:center;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ff512f;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Continue</button>
</div>

<script>
function login(){
    window.location="technicians.html";
}
</script>

</body>
</html>
