<!DOCTYPE html>
<html>
<head>
<title>Technicians</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#eee;
}

.header{
    background:#ff512f;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    display:flex;
}

.list{
    width:60%;
    padding:15px;
}

.card{
    background:white;
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

.rating{
    color:green;
}

.map{
    width:40%;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}
</style>

</head>

<body>

<div class="header">Nearby Technicians</div>

<div class="container">

    <div class="list">

        <div class="card">
            <div>
                <h3>Raj Technician</h3>
                <p>Phone Repair Specialist</p>
                <span class="rating">⭐ 4.5</span>
            </div>
            <div>📞 9000000001</div>
        </div>

        <div class="card">
            <div>
                <h3>Amit Cooling Expert</h3>
                <p>AC & Fridge Repair</p>
                <span class="rating">⭐ 4.2</span>
            </div>
            <div>📞 9000000002</div>
        </div>

        <div class="card">
            <div>
                <h3>Smart Fix Services</h3>
                <p>All Device Repairs</p>
                <span class="rating">⭐ 4.7</span>
            </div>
            <div>📞 9000000003</div>
        </div>

    </div>

    <div class="map">
        <iframe src="https://maps.google.com/maps?q=mumbai&z=12&output=embed"></iframe>
    </div>

</div>

</body>
</html>
